<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CRM ArQos">
<title>CRM ArQos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');
:root{
  --bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--surface3:#252525;
  --border:#2a2a2a;--border2:#333;--text:#f0f0f0;--text2:#999;--text3:#555;
  --green:#00e676;--green-dim:#1a3a2a;--amber:#ffab40;--amber-dim:#3a2a10;
  --red:#ff5252;--red-dim:#3a1515;--blue:#448aff;--blue-dim:#1a2540;
  --purple:#ce93d8;--purple-dim:#2a1a35;--teal:#26c6da;--teal-dim:#0d2a30;
  --orange:#ff9800;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overflow-x:hidden;}
h1,h2,h3{font-family:'Syne',sans-serif;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:36px 28px;width:100%;max-width:360px;text-align:center;}
.login-logo{width:56px;height:56px;background:var(--green);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;}
.login-box h2{font-size:22px;font-weight:700;margin-bottom:4px;}
.login-box p{font-size:13px;color:var(--text2);margin-bottom:24px;}
.login-field{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;width:100%;margin-bottom:12px;}
.login-field:focus{outline:none;border-color:var(--green);}
.login-btn{background:var(--green);color:#000;border:none;width:100%;padding:14px;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:16px;cursor:pointer;}
.login-error{color:var(--red);font-size:12px;margin-top:8px;min-height:18px;}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:998;flex-direction:column;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* APP */
.app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.topbar h2{font-size:17px;font-weight:700;}
.btn-add{background:var(--green);color:#000;border:none;padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;font-size:13px;white-space:nowrap;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;gap:3px;background:none;border:none;cursor:pointer;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:10px;}
.bnav-btn.active{color:var(--green);}
.bnav-icon{font-size:20px;line-height:1;}

/* CONTENT */
.main{flex:1;padding-bottom:70px;}
.content{padding:12px 12px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;}
.stat-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:3px;}
.stat-num{font-size:20px;font-weight:700;font-family:'Syne',sans-serif;}

/* FILTER PILLS */
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;-webkit-overflow-scrolling:touch;}
.pills::-webkit-scrollbar{display:none;}
.pill{white-space:nowrap;padding:5px 12px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.pill.active{background:var(--green-dim);border-color:var(--green);color:var(--green);}

.search-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;margin-bottom:10px;}
.search-box::placeholder{color:var(--text3);}

/* ===== CONTACT CARDS ===== */
.cards-list{display:flex;flex-direction:column;gap:8px;}

.ccard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;cursor:pointer;
  transition:border-color 0.15s;
}
.ccard:active{border-color:var(--green);}
.ccard.expanded{border-color:var(--border2);}

/* CARD HEADER - always visible */
.ccard-header{
  display:flex;align-items:center;padding:12px 14px;gap:10px;
}
.ccard-avatar{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;font-family:'Syne',sans-serif;
  flex-shrink:0;
  background:var(--green-dim);color:var(--green);
}
.ccard-main{flex:1;min-width:0;}
.ccard-name{font-weight:600;font-size:14px;font-family:'Syne',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ccard-phone{font-size:11px;color:var(--text2);margin-top:1px;}
.ccard-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}

/* CONTACT CHIP - días para contactar */
.contact-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;
  white-space:nowrap;
}
.contact-chip.hoy{background:#1a3a10;color:#69f0ae;border:1px solid #69f0ae40;}
.contact-chip.pronto{background:var(--green-dim);color:var(--green);}
.contact-chip.dias{background:var(--amber-dim);color:var(--amber);}
.contact-chip.vencido{background:var(--red-dim);color:var(--red);}
.contact-chip.sin{background:var(--surface2);color:var(--text3);}

.ccard-money{font-size:12px;font-weight:600;color:var(--green);}
.ccard-chevron{font-size:12px;color:var(--text3);transition:transform 0.2s;}
.ccard.expanded .ccard-chevron{transform:rotate(180deg);}

/* CARD BODY - expandible */
.ccard-body{display:none;border-top:1px solid var(--border);padding:12px 14px;}
.ccard.expanded .ccard-body{display:block;}

.ccard-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.ccard-info-item{background:var(--surface2);border-radius:8px;padding:8px 10px;}
.ccard-info-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:2px;}
.ccard-info-value{font-size:12px;font-weight:500;}
.ccard-info-value.green{color:var(--green);}
.ccard-info-value.amber{color:var(--amber);}
.ccard-info-value.red{color:var(--red);}
.ccard-info-value.teal{color:var(--teal);}

.ccard-notas{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:12px;padding:8px;background:var(--surface2);border-radius:8px;}

.ccard-actions{display:flex;gap:8px;}
.ccard-btn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;text-align:center;}
.ccard-btn.wa{background:#25D366;border-color:#25D366;color:#fff;font-weight:600;}
.ccard-btn.edit{color:var(--text);}
.ccard-btn.del{color:var(--red);}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;}
.badge.nuevo{background:var(--blue-dim);color:var(--blue);}
.badge.cotizado{background:var(--amber-dim);color:var(--amber);}
.badge.seguimiento{background:var(--purple-dim);color:var(--purple);}
.badge.cita{background:var(--teal-dim);color:var(--teal);}
.badge.cerrado{background:var(--green-dim);color:var(--green);}
.badge.instalando{background:#2a1f00;color:#ffd740;}
.badge.terminado{background:#0a2a0a;color:#69f0ae;}
.badge.recompra{background:#1a1a3a;color:#b39ddb;}
.badge.perdido{background:var(--red-dim);color:var(--red);}

/* TOTAL BAR */
.total-bar{background:var(--surface);border:1px solid var(--green-dim);border-radius:12px;padding:12px 16px;margin-top:12px;display:flex;align-items:center;justify-content:space-between;}
.total-label{font-size:11px;color:var(--text2);}
.total-amount{font-size:22px;font-weight:700;color:var(--green);font-family:'Syne',sans-serif;}

/* SEGUIMIENTO VIEW */
.seg-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.seg-left{flex:1;min-width:0;}
.seg-name{font-weight:600;font-size:14px;font-family:'Syne',sans-serif;}
.seg-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.seg-money{font-size:13px;font-weight:600;color:var(--green);margin-top:4px;}
.seg-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.wa-btn{background:#25D366;color:#fff;border:none;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;white-space:nowrap;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:20px 16px 32px;}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg.full{grid-column:1/-1;}
.fg label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;}
.fg input,.fg select,.fg textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;}
.fg textarea{resize:vertical;min-height:70px;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--green);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
.btn-cancel{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:11px 18px;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;}
.btn-save{background:var(--green);border:none;color:#000;padding:11px 22px;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;}

/* DETAIL SHEET */
.detail-bg{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.detail-panel{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;padding:20px 16px 32px;}
.detail-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
.detail-name{font-size:20px;font-weight:700;font-family:'Syne',sans-serif;}
.detail-phone{color:var(--text2);font-size:13px;margin-top:2px;}
.detail-section{margin-bottom:16px;}
.detail-section-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border);}
.detail-row:last-child{border-bottom:none;}
.detail-row span:first-child{color:var(--text2);}
.detail-row span:last-child{color:var(--text);font-weight:500;text-align:right;max-width:60%;}
.reminder-card{background:var(--teal-dim);border:1px solid rgba(38,198,218,0.2);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.reminder-text{font-size:12px;color:var(--teal);line-height:1.5;}
.detail-action-row{display:flex;gap:8px;margin-bottom:14px;}
.detail-action-btn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;text-align:center;}
.detail-action-btn.wa{background:#25D366;border-color:#25D366;color:#fff;font-weight:600;}

/* PIPELINE */
.pipeline-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
.pipeline-scroll::-webkit-scrollbar{display:none;}
.pcol{min-width:155px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;}
.pcol-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.pcol-title{font-size:12px;font-weight:600;}
.pcol-count{font-size:11px;color:var(--text3);}
.pcol-total{font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px;}
.pitem{padding:8px;background:var(--surface2);border-radius:8px;margin-bottom:6px;cursor:pointer;}
.pitem-name{font-size:12px;font-weight:500;}
.pitem-amount{font-size:11px;color:var(--green);}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px;}
.cal-day-name{text-align:center;font-size:10px;color:var(--text3);padding:3px;text-transform:uppercase;}
.cal-day{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 2px;text-align:center;min-height:44px;font-size:11px;}
.cal-day.today{border-color:var(--green);}
.cal-day.empty{background:transparent;border-color:transparent;}
.cal-day-num{font-weight:600;margin-bottom:2px;font-size:11px;}
.cal-event{font-size:9px;background:var(--teal-dim);color:var(--teal);border-radius:3px;padding:1px 3px;margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.cal-event.install{background:var(--amber-dim);color:var(--amber);}
.cal-event.recontact{background:var(--purple-dim);color:var(--purple);}
.ev-item{display:flex;gap:10px;align-items:flex-start;padding:10px;background:var(--surface);border-radius:10px;margin-bottom:8px;border:1px solid var(--border);}
.ev-date{min-width:36px;text-align:center;}
.ev-date-num{font-size:18px;font-weight:700;font-family:'Syne',sans-serif;}
.ev-date-mon{font-size:10px;color:var(--text3);}

/* SYNC */
.sync-bar{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px;margin-top:2px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

.hidden{display:none!important;}
select option{background:#1e1e1e;}

/* DESKTOP - sidebar para pantallas grandes */
@media(min-width:1100px){
  .app{flex-direction:row;}
  .bottom-nav{display:none;}
  .sidebar-desktop{width:200px;min-width:200px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;position:fixed;height:100vh;overflow-y:auto;}
  .main{margin-left:200px;padding-bottom:0;}
  .content{padding:20px 24px;}
  .stats-grid{grid-template-columns:repeat(6,1fr);}
  .modal-bg,.detail-bg{align-items:center;}
  .modal,.detail-panel{border-radius:16px;max-width:560px;}
  .topbar{padding:14px 24px;}
  .form-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:1099px){
  .sidebar-desktop{display:none;}
}
@media(max-width:500px){
  .form-grid{grid-template-columns:1fr;}
  .fg.full{grid-column:1;}
}

/* Desktop sidebar styles */
.d-logo{padding:0 16px 16px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.d-logo-icon{width:34px;height:34px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:6px;}
.d-logo-title{font-size:15px;font-weight:700;font-family:'Syne',sans-serif;}
.d-logo-sub{font-size:10px;color:var(--text2);}
.d-sec{padding:0 10px;margin-bottom:6px;}
.d-sec-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:3px 6px;}
.d-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--text2);font-size:12px;font-family:'DM Sans',sans-serif;border:none;background:none;width:100%;text-align:left;}
.d-btn:hover{background:var(--surface2);color:var(--text);}
.d-btn.active{background:var(--green-dim);color:var(--green);}
.d-btn .icon{font-size:14px;min-width:18px;text-align:center;}
.d-logout{margin:auto 10px 10px;padding:8px 10px;border-radius:7px;background:none;border:1px solid var(--border);color:var(--text3);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;width:calc(100% - 20px);}
.d-logout:hover{border-color:var(--red);color:var(--red);}

.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">💬</div>
    <h2>CRM ArQos</h2>
    <p>Ingresa tus credenciales</p>
    <input class="login-field" type="text" id="login-user" placeholder="Usuario" autocomplete="username">
    <input class="login-field" type="password" id="login-pass" placeholder="Contraseña" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-screen" class="hidden">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text2)">Conectando...</div>
</div>

<!-- APP -->
<div class="app hidden" id="app">

  <!-- DESKTOP SIDEBAR -->
  <aside class="sidebar-desktop">
    <div class="d-logo">
      <div class="d-logo-icon">💬</div>
      <div class="d-logo-title">CRM ArQos</div>
      <div class="d-logo-sub">WhatsApp Business</div>
    </div>
    <div class="d-sec">
      <div class="d-sec-label">Vistas</div>
      <button class="d-btn active" onclick="showView('contactos')"><span class="icon">👥</span>Contactos</button>
      <button class="d-btn" onclick="showView('seguimiento')"><span class="icon">🔔</span>Seguimiento</button>
      <button class="d-btn" onclick="showView('calendario')"><span class="icon">📅</span>Calendario</button>
      <button class="d-btn" onclick="showView('pipeline')"><span class="icon">📊</span>Pipeline</button>
    </div>
    <div class="d-sec" style="margin-top:4px">
      <div class="d-sec-label">Filtrar por</div>
      <button class="d-btn" onclick="setQuickFilter('nuevo')"><span class="icon">🆕</span>Nuevos</button>
      <button class="d-btn" onclick="setQuickFilter('cotizado')"><span class="icon">📋</span>Cotizados</button>
      <button class="d-btn" onclick="setQuickFilter('cita')"><span class="icon">🗓️</span>Con cita</button>
      <button class="d-btn" onclick="setQuickFilter('cerrado')"><span class="icon">✅</span>Cerrados</button>
      <button class="d-btn" onclick="setQuickFilter('terminado')"><span class="icon">🏁</span>Terminados</button>
      <button class="d-btn" onclick="setQuickFilter('')"><span class="icon">👁</span>Todos</button>
    </div>
    <div style="flex:1"></div>
    <button class="d-logout" onclick="doLogout()">🚪 Cerrar sesión</button>
  </aside>

  <main class="main">

    <!-- ===== CONTACTOS ===== -->
    <div id="view-contactos">
      <div class="topbar">
        <div>
          <h2>Contactos</h2>
          <div class="sync-bar"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">Conectando...</span></div>
        </div>
        <button class="btn-add" onclick="openModal()">+ Nuevo</button>
      </div>
      <div class="content">
        <div class="stats-grid" id="stats-grid"></div>
        <div class="pills" id="pills">
          <button class="pill active" onclick="setQuickFilter('')" data-q="">Todos</button>
          <button class="pill" onclick="setQuickFilter('nuevo')" data-q="nuevo">🆕 Nuevos</button>
          <button class="pill" onclick="setQuickFilter('cotizado')" data-q="cotizado">📋 Cotizados</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbzm8DUIox8XKF33loLn03cM7XyK-w-PY",
  authDomain: "crm-whatsapp-c1e68.firebaseapp.com",
  projectId: "crm-whatsapp-c1e68",
  storageBucket: "crm-whatsapp-c1e68.firebasestorage.app",
  messagingSenderId: "193960034006",
  appId: "1:193960034006:web:67852c48aef14f2dd89377"
};

const CREDS = { user: 'admin', pass: 'Parmesano31#' };
let contacts = [], editingId = null, dbUnsub = null, quickFilter = '', expandedId = null;
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// --- HELPERS ---
const daysSince = d => d ? Math.floor((new Date() - new Date(d)) / 86400000) : null;
const daysUntil = d => d ? Math.floor((new Date(d + 'T12:00:00') - new Date()) / 86400000) : null;
const formatDate = d => d ? new Date(d + 'T12:00:00').toLocaleDateString('es-MX', { day:'2-digit', month:'short' }) : '—';
const formatDateFull = d => d ? new Date(d + 'T12:00:00').toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'2-digit' }) : '—';
const formatMoney = n => n ? '$' + Number(n).toLocaleString('es-MX') : '—';
const statusLabel = s => ({nuevo:'Nuevo',cotizado:'Cotizado',seguimiento:'Seguimiento',cita:'Con cita',cerrado:'Venta cerrada',instalando:'Instalando',terminado:'Terminado',recompra:'Re-contactar',perdido:'Perdido'}[s]||s);
const initials = name => name ? name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase() : '?';

// Chip de próximo contacto
function contactChip(c) {
  // Prioridad: fecha_recontactar, luego fecha_cita
  const dateStr = c.fechaRecontactar || c.fechaCita;
  if (!dateStr) return `<span class="contact-chip sin">Sin fecha</span>`;
  const days = daysUntil(dateStr);
  if (days < 0) return `<span class="contact-chip vencido">⚠ Vencido</span>`;
  if (days === 0) return `<span class="contact-chip hoy">🟢 Contactar hoy</span>`;
  if (days === 1) return `<span class="contact-chip pronto">1 día</span>`;
  if (days <= 3) return `<span class="contact-chip pronto">${days} días</span>`;
  return `<span class="contact-chip dias">${days} días</span>`;
}

function setSyncing(s) {
  const dot = document.getElementById('sync-dot'), txt = document.getElementById('sync-text');
  if (!dot) return;
  dot.classList.toggle('syncing', s);
  txt.textContent = s ? 'Guardando...' : 'Sincronizado ✓';
}

// --- AUTH ---
window.doLogin = function() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (u === CREDS.user && p === CREDS.pass) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('loading-screen').classList.remove('hidden');
    startDB();
  } else {
    document.getElementById('login-error').textContent = 'Usuario o contraseña incorrectos.';
    setTimeout(() => document.getElementById('login-error').textContent = '', 3000);
  }
};
document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key==='Enter') window.doLogin(); });
document.getElementById('login-user').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('login-pass').focus(); });

window.doLogout = function() {
  if (dbUnsub) dbUnsub();
  contacts = [];
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
};

function startDB() {
  const q = query(collection(db, 'contactos'), orderBy('creadoEl', 'desc'));
  dbUnsub = onSnapshot(q, snap => {
    contacts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    setSyncing(false);
    renderStats();
    renderCards();
  }, err => {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('sync-text').textContent = 'Error conexión';
    console.error(err);
  });
}

// --- STATS ---
window.renderStats = function() {
  const t = contacts.length;
  const n = contacts.filter(c => c.estado==='nuevo').length;
  const co = contacts.filter(c => c.estado==='cotizado').length;
  const ci = contacts.filter(c => c.estado==='cita').length;
  const ce = contacts.filter(c => ['cerrado','instalando','terminado'].includes(c.estado)).length;
  const hoy = contacts.filter(c => {
    const d = c.fechaRecontactar || c.fechaCita;
    return d && daysUntil(d) === 0;
  }).length;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-num">${t}</div></div>
    <div class="stat-card"><div class="stat-label">Nuevos</div><div class="stat-num" style="color:var(--blue)">${n}</div></div>
    <div class="stat-card"><div class="stat-label">Cotizados</div><div class="stat-num" style="color:var(--amber)">${co}</div></div>
    <div class="stat-card"><div class="stat-label">Con cita</div><div class="stat-num" style="color:var(--teal)">${ci}</div></div>
    <div class="stat-card"><div class="stat-label">Cerrados</div><div class="stat-num" style="color:var(--green)">${ce}</div></div>
    <div class="stat-card"><div class="stat-label">Hoy🟢</div><div class="stat-num" style="color:#69f0ae">${hoy}</div></div>`;
  const total = contacts.reduce((s,c) => s + (Number(c.ganancia)||0), 0);
  const el = document.getElementById('total-ganancia');
  if (el) el.textContent = '$' + total.toLocaleString('es-MX');
};

// --- CARDS ---
window.setQuickFilter = function(status) {
  quickFilter = status;
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.q === status));
  document.querySelectorAll('.d-btn[data-q]').forEach(b => b.classList.toggle('active', b.dataset.q === status));
  renderCards();
};

window.toggleCard = function(id) {
  expandedId = expandedId === id ? null : id;
  renderCards();
};

window.renderCards = function() {
  const search = (document.getElementById('search-input')?.value || '').toLowerCase();
  const filtered = contacts.filter(c => {
    if (quickFilter && c.estado !== quickFilter) return false;
    if (search && !c.nombre?.toLowerCase().includes(search) && !c.telefono?.includes(search) && !(c.servicio||'').toLowerCase().includes(search)) return false;
    return true;
  });

  const list = document.getElementById('cards-list');
  if (!list) return;
  if (filtered.length === 0) { list.innerHTML = `<div class="empty-state">No hay contactos que coincidan</div>`; return; }

  list.innerHTML = filtered.map(c => {
    const isExpanded = expandedId === c.id;
    const du = daysUntil(c.fechaCita);
    const di = daysUntil(c.fechaInstalacion);

    let citaHtml = '—', citaColor = '';
    if (c.fechaCita) {
      const lbl = du === 0 ? '¡HOY!' : du === 1 ? 'Mañana' : du < 0 ? 'Pasada' : `en ${du}d`;
      citaColor = du === 0 ? 'green' : du < 0 ? 'red' : 'teal';
      citaHtml = `${formatDate(c.fechaCita)} ${lbl}`;
    }
    let installHtml = '—', installColor = '';
    if (c.fechaInstalacion) {
      installColor = di !== null && di >= 0 && di <= 2 ? 'amber' : '';
      installHtml = formatDateFull(c.fechaInstalacion);
    }

    const bodyHtml = isExpanded ? `
      <div class="ccard-body">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span class="badge ${c.estado}">${statusLabel(c.estado)}</span>
          ${c.servicio ? `<span style="font-size:11px;color:var(--text2)">🔧 ${c.servicio}</span>` : ''}
        </div>
        <div class="ccard-info-grid">
          <div class="ccard-info-item">
            <div class="ccard-info-label">Ganancia est.</div>
            <div class="ccard-info-value green">${formatMoney(c.ganancia)}</div>
          </div>
          <div class="ccard-info-item">
            <div class="ccard-info-label">Cotización</div>
            <div class="ccard-info-value">${c.fechaCotizacion ? daysSince(c.fechaCotizacion)+'d ago' : '—'}</div>
          </div>
          <div class="ccard-info-item">
            <div class="ccard-info-label">Próxima cita</div>
            <div class="ccard-info-value ${citaColor}">${citaHtml}</div>
          </div>
          <div class="ccard-info-item">
            <div class="ccard-info-label">Instalación</div>
            <div class="ccard-info-value ${installColor}">${installHtml}</div>
          </div>
          <div class="ccard-info-item">
            <div class="ccard-info-label">Próx. contacto</div>
            <div class="ccard-info-value">${c.fechaRecontactar ? formatDateFull(c.fechaRecontactar) : '—'}</div>
          </div>
        </div>
        ${c.notas ? `<div class="ccard-notas">📝 ${c.notas}</div>` : ''}
        <div class="ccard-actions" onclick="event.stopPropagation()">
          <button class="ccard-btn wa" onclick="openWA('${c.telefono}')">💬 WhatsApp</button>
          <button class="ccard-btn edit" onclick="editContact('${c.id}')">✏️ Editar</button>
          <button class="ccard-btn del" onclick="deleteContact('${c.id}')">🗑</button>
        </div>
      </div>` : '';

    return `<div class="ccard ${isExpanded ? 'expanded' : ''}" onclick="toggleCard('${c.id}')">
      <div class="ccard-header">
        <div class="ccard-avatar">${initials(c.nombre)}</div>
        <div class="ccard-main">
          <div class="ccard-name">${c.nombre}</div>
          <div class="ccard-phone">📱 ${c.telefono}</div>
        </div>
        <div class="ccard-right">
          ${contactChip(c)}
          <div class="ccard-money">${formatMoney(c.ganancia)}</div>
        </div>
        <div class="ccard-chevron">▼</div>
      </div>
      ${bodyHtml}
    </div>`;
  }).join('');
};

window.openWA = function(phone) {
  const n = phone.replace(/\D/g,'');
  window.open(`https://wa.me/${n.startsWith('52')?n:'52'+n}`, '_blank');
};

// --- SEGUIMIENTO VIEW ---
function renderSeguimiento() {
  const el = document.getElementById('seguimiento-content');
  if (!el) return;

  // Todos los que tienen fecha de próximo contacto o cita
  const lista = contacts.filter(c => c.fechaRecontactar || c.fechaCita)
    .map(c => {
      const dateStr = c.fechaRecontactar || c.fechaCita;
      const days = daysUntil(dateStr);
      return { ...c, days, dateStr };
    })
    .sort((a, b) => a.days - b.days);

  if (lista.length === 0) { el.innerHTML = `<div class="empty-state">No hay contactos con fechas de seguimiento</div>`; return; }

  // Agrupar
  const hoy = lista.filter(c => c.days === 0);
  const proximos = lista.filter(c => c.days > 0 && c.days <= 7);
  const despues = lista.filter(c => c.days > 7);
  const vencidos = lista.filter(c => c.days < 0);

  function cardHtml(c) {
    const chip = contactChip(c);
    return `<div class="seg-card">
      <div class="seg-left">
        <div class="seg-name">${c.nombre}</div>
        <div class="seg-sub">📱 ${c.telefono} · ${statusLabel(c.estado)}</div>
        ${c.servicio ? `<div class="seg-sub">🔧 ${c.servicio}</div>` : ''}
        <div class="seg-money">${formatMoney(c.ganancia)}</div>
      </div>
      <div class="seg-right">
        ${chip}
        <button class="wa-btn" onclick="openWA('${c.telefono}');event.stopPropagation()">💬 WA</button>
      </div>
    </div>`;
  }

  function section(title, color, items) {
    if (!items.length) return '';
    return `<div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:600;color:${color};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;padding:6px 10px;background:${color}15;border-radius:6px">${title} (${items.length})</div>
      ${items.map(cardHtml).join('')}
    </div>`;
  }

  el.innerHTML =
    section('🟢 Contactar hoy', '#69f0ae', hoy) +
    section('⚡ Esta semana', 'var(--green)', proximos) +
    section('⚠️ Vencidos', 'var(--red)', vencidos) +
    section('📅 Próximamente', 'var(--text2)', despues);
}

// --- MODAL ---
window.openModal = function() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Nuevo contacto';
  ['f-nombre','f-telefono','f-servicio','f-notas','f-ganancia','f-fecha-cotizacion','f-fecha-cita','f-hora-cita','f-fecha-instalacion','f-fecha-recontactar'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-estado').value = 'nuevo';
  document.getElementById('modal-bg').classList.remove('hidden');
};

window.editContact = function(id) {
  const c = contacts.find(x => x.id === id); if (!c) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Editar contacto';
  document.getElementById('f-nombre').value = c.nombre||'';
  document.getElementById('f-telefono').value = c.telefono||'';
  document.getElementById('f-servicio').value = c.servicio||'';
  document.getElementById('f-estado').value = c.estado||'nuevo';
  document.getElementById('f-ganancia').value = c.ganancia||'';
  document.getElementById('f-fecha-cotizacion').value = c.fechaCotizacion||'';
  document.getElementById('f-fecha-cita').value = c.fechaCita||'';
  document.getElementById('f-hora-cita').value = c.horaCita||'';
  document.getElementById('f-fecha-instalacion').value = c.fechaInstalacion||'';
  document.getElementById('f-fecha-recontactar').value = c.fechaRecontactar||'';
  document.getElementById('f-notas').value = c.notas||'';
  document.getElementById('modal-bg').classList.remove('hidden');
  expandedId = null;
  renderCards();
};

window.closeModal = () => { document.getElementById('modal-bg').classList.add('hidden'); editingId = null; };

window.saveContact = async function() {
  const nombre = document.getElementById('f-nombre').value.trim();
  const telefono = document.getElementById('f-telefono').value.trim();
  if (!nombre || !telefono) { alert('Nombre y teléfono son obligatorios.'); return; }
  setSyncing(true);
  const data = {
    nombre, telefono,
    servicio: document.getElementById('f-servicio').value.trim(),
    estado: document.getElementById('f-estado').value,
    ganancia: Number(document.getElementById('f-ganancia').value)||0,
    fechaCotizacion: document.getElementById('f-fecha-cotizacion').value,
    fechaCita: document.getElementById('f-fecha-cita').value,
    horaCita: document.getElementById('f-hora-cita').value,
    fechaInstalacion: document.getElementById('f-fecha-instalacion').value,
    fechaRecontactar: document.getElementById('f-fecha-recontactar').value,
    notas: document.getElementById('f-notas').value.trim(),
  };
  try {
    if (editingId) { await updateDoc(doc(db,'contactos',editingId), data); }
    else { data.creadoEl = new Date().toISOString(); await addDoc(collection(db,'contactos'), data); }
    closeModal();
  } catch(e) { alert('Error: '+e.message); setSyncing(false); }
};

window.deleteContact = async function(id) {
  if (!confirm('¿Eliminar este contacto?')) return;
  setSyncing(true);
  try { await deleteDoc(doc(db,'contactos',id)); }
  catch(e) { alert('Error: '+e.message); setSyncing(false); }
};

// --- VIEWS ---
window.showView = function(v) {
  ['contactos','seguimiento','calendario','pipeline'].forEach(view => {
    document.getElementById('view-'+view)?.classList.toggle('hidden', view !== v);
  });
  document.querySelectorAll('.d-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.d-btn[onclick="showView('${v}')"]`)?.classList.add('active');
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('bnav-'+v)?.classList.add('active');
  if (v === 'seguimiento') renderSeguimiento();
  if (v === 'calendario') renderCalendar();
  if (v === 'pipeline') renderPipeline();
};

// --- CALENDAR ---
function renderCalendar() {
  const today = new Date(), y = today.getFullYear(), m = today.getMonth();
  const mNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('cal-month-label').textContent = mNames[m]+' '+y;
  document.getElementById('cal-header').innerHTML = ['D','L','M','X','J','V','S'].map(d=>`<div class="cal-day-name">${d}</div>`).join('');
  const fd = new Date(y,m,1).getDay(), dim = new Date(y,m+1,0).getDate();
  const evs = {};
  contacts.forEach(c => {
    const add = (ds, lbl, type) => {
      if (!ds) return;
      const d = new Date(ds+'T12:00:00');
      if (d.getFullYear()===y && d.getMonth()===m) {
        const day = d.getDate();
        if (!evs[day]) evs[day] = [];
        evs[day].push({lbl, type});
      }
    };
    add(c.fechaCita, c.nombre?.split(' ')[0]||'', 'cita');
    add(c.fechaInstalacion, c.nombre?.split(' ')[0]||'', 'install');
    add(c.fechaRecontactar, c.nombre?.split(' ')[0]||'', 'recontact');
  });
  let html = '';
  for (let i=0;i<fd;i++) html += '<div class="cal-day empty"></div>';
  for (let d=1;d<=dim;d++) {
    const ev = evs[d]||[];
    html += `<div class="cal-day ${d===today.getDate()?'today':''}"><div class="cal-day-num">${d}</div>${ev.map(e=>`<div class="cal-event ${e.type}">${e.lbl}</div>`).join('')}</div>`;
  }
  document.getElementById('cal-body').innerHTML = html;
  const allEv = [];
  contacts.forEach(c => {
    if (c.fechaCita){const d=new Date(c.fechaCita+'T12:00:00');if(d.getFullYear()===y&&d.getMonth()===m) allEv.push({date:c.fechaCita,label:`🗓 Cita: ${c.nombre}`,sub:c.horaCita?'a las '+c.horaCita:'',color:'var(--teal)'});}
    if (c.fechaInstalacion){const d=new Date(c.fechaInstalacion+'T12:00:00');if(d.getFullYear()===y&&d.getMonth()===m) allEv.push({date:c.fechaInstalacion,label:`🔧 Instalación: ${c.nombre}`,sub:c.servicio||'',color:'var(--amber)'});}
    if (c.fechaRecontactar){const d=new Date(c.fechaRecontactar+'T12:00:00');if(d.getFullYear()===y&&d.getMonth()===m) allEv.push({date:c.fechaRecontactar,label:`🔄 Re-contactar: ${c.nombre}`,sub:formatMoney(c.ganancia),color:'var(--purple)'});}
  });
  allEv.sort((a,b)=>a.date>b.date?1:-1);
  document.getElementById('events-list').innerHTML = allEv.length ? allEv.map(e=>`
    <div class="ev-item">
      <div class="ev-date" style="color:${e.color}">
        <div class="ev-date-num">${new Date(e.date+'T12:00:00').getDate()}</div>
        <div class="ev-date-mon">${mNames[m].slice(0,3)}</div>
      </div>
      <div>
        <div style="font-size:13px;font-weight:500;color:${e.color}">${e.label}</div>
        <div style="font-size:11px;color:var(--text3)">${e.sub}</div>
      </div>
    </div>`).join('') : '<div class="empty-state">No hay eventos este mes</div>';
}

// --- PIPELINE ---
function renderPipeline() {
  const stages=[
    {key:'nuevo',label:'Nuevos',icon:'🆕'},{key:'cotizado',label:'Cotizados',icon:'📋'},
    {key:'seguimiento',label:'Seguimiento',icon:'🔔'},{key:'cita',label:'Con cita',icon:'🗓'},
    {key:'cerrado',label:'Cerrado',icon:'✅'},{key:'instalando',label:'Instalando',icon:'🔧'},
    {key:'terminado',label:'Terminado',icon:'🏁'},{key:'recompra',label:'Re-contactar',icon:'🔄'},
    {key:'perdido',label:'Perdido',icon:'❌'}
  ];
  document.getElementById('pipeline-grid').innerHTML = stages.map(s => {
    const g = contacts.filter(c=>c.estado===s.key);
    const total = g.reduce((a,c)=>a+(Number(c.ganancia)||0),0);
    return `<div class="pcol">
      <div class="pcol-header"><span style="font-size:16px">${s.icon}</span>
        <div><div class="pcol-title">${s.label}</div><div class="pcol-count">${g.length} cliente${g.length!==1?'s':''}</div></div>
      </div>
      ${total?`<div class="pcol-total">$${total.toLocaleString('es-MX')}</div>`:''}
      ${g.map(c=>`<div class="pitem" onclick="showView('contactos');setQuickFilter('');setTimeout(()=>{expandedId='${c.id}';renderCards()},100)">
        <div class="pitem-name">${c.nombre}</div>
        ${c.ganancia?`<div class="pitem-amount">$${Number(c.ganancia).toLocaleString('es-MX')}</div>`:''}
      </div>`).join('')}
    </div>`;
  }).join('');
}

document.getElementById('detail-bg').addEventListener('click', e => { if(e.target===e.currentTarget) document.getElementById('detail-bg').classList.add('hidden'); });
document.getElementById('modal-bg').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
</script>
